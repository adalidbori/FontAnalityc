<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Front Analytics</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css?v=6">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-primary);
    }
    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      width: 80px;
      height: 80px;
      background: var(--accent-gradient);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.5rem;
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .btn-microsoft {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      background: #2f2f2f;
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-normal);
      text-decoration: none;
    }
    .btn-microsoft:hover {
      background: #404040;
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      color: white;
    }
    .btn-microsoft svg {
      width: 21px;
      height: 21px;
    }
    .login-footer {
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box animate-fade-in">
      <div class="login-logo">
        <i class="fas fa-chart-line"></i>
      </div>
      <h1 class="login-title">Front Analytics</h1>
      <p class="login-subtitle">Sign in with your Microsoft account to continue</p>

      <a href="/auth/login" id="loginBtn" class="btn-microsoft">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </a>

      <p class="login-footer">
        Only authorized users can access this application.
      </p>
      <!-- Debug info (remove after testing) -->
      <div id="debug" style="margin-top:20px; text-align:left; font-size:11px; color:#999; background:#f5f5f5; padding:12px; border-radius:8px; max-height:200px; overflow-y:auto; display:none;">
        <strong>Debug:</strong><br>
        <pre id="debugLog" style="white-space:pre-wrap; margin:0;"></pre>
      </div>
    </div>
  </div>

  <script src="https://res.cdn.office.net/teams-js/2.28.0/js/MicrosoftTeams.min.js"></script>
  <script>
    function log(msg) {
      const el = document.getElementById('debugLog');
      const container = document.getElementById('debug');
      container.style.display = 'block';
      el.textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
      console.log('[Teams Debug]', msg);
    }

    (async function() {
      const isInIframe = window.self !== window.top;
      log('isInIframe: ' + isInIframe);

      if (!isInIframe) {
        log('Not in iframe, using normal login');
        return;
      }

      log('Detected iframe, attempting Teams SSO...');

      // Step 1: Initialize Teams SDK
      try {
        log('Initializing Teams SDK...');
        await microsoftTeams.app.initialize();
        log('Teams SDK initialized OK');
      } catch (err) {
        log('ERROR initializing Teams SDK: ' + (err.message || JSON.stringify(err)));
        return;
      }

      // Step 2: Get context
      try {
        const context = await microsoftTeams.app.getContext();
        log('Teams context: hostName=' + (context.app?.host?.name || 'unknown') + ', userEmail=' + (context.user?.loginHint || 'unknown'));
      } catch (err) {
        log('ERROR getting context: ' + (err.message || JSON.stringify(err)));
      }

      // Step 3: Get SSO token
      try {
        log('Requesting SSO token...');
        const token = await microsoftTeams.authentication.getAuthToken();
        log('Got SSO token: ' + token.substring(0, 20) + '...');

        // Step 4: Send token to server
        log('Sending token to /auth/teams-sso...');
        const res = await fetch('/auth/teams-sso', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await res.json();
        log('Server response: ' + res.status + ' ' + JSON.stringify(data));

        if (res.ok) {
          log('SSO success! Redirecting to calendar...');
          window.location.href = '/calendar.html';
        } else {
          log('SSO server rejected: ' + (data.error || res.status));
        }
      } catch (err) {
        log('ERROR SSO token: ' + (err.message || err.errorCode || JSON.stringify(err)));
        log('Falling back to manual login button');
      }
    })();
  </script>
</body>
</html>
